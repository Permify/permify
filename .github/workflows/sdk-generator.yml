name: Generate Client SDKs from OpenAPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Optional release tag to forward to SDK workflows that need explicit versioning, for example v1.6.9"
        required: false
        type: string

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@df199fb7be9f65074067a9eb93f12bb4c5547cf2 # v2.13.3
              with:
                egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Invoke generator workflow Permify/permify-java repo
              uses: benc-uk/workflow-dispatch@e2e5e9a103e331dad343f381a29e654aea3cf8fc # v1.2.4
              with:
                workflow: generator.yml
                repo: Permify/permify-java
                ref: master
                token: "${{ secrets.SDK_GH_TOKEN }}"
        
            - name: Invoke generator workflow Permify/permify-python repo
              uses: benc-uk/workflow-dispatch@e2e5e9a103e331dad343f381a29e654aea3cf8fc # v1.2.4
              with:
                workflow: generator.yml
                repo: Permify/permify-python
                ref: main
                token: "${{ secrets.SDK_GH_TOKEN }}"

            - name: Invoke generator workflow Permify/permify-javascript repo
              uses: benc-uk/workflow-dispatch@e2e5e9a103e331dad343f381a29e654aea3cf8fc # v1.2.4
              with:
                workflow: generator.yml
                repo: Permify/permify-javascript
                ref: main
                token: "${{ secrets.SDK_GH_TOKEN }}"

            - name: Invoke generator workflow Permify/permify-typescript repo
              uses: benc-uk/workflow-dispatch@e2e5e9a103e331dad343f381a29e654aea3cf8fc # v1.2.4
              with:
                workflow: generator.yml
                repo: Permify/permify-typescript
                ref: master
                token: "${{ secrets.SDK_GH_TOKEN }}"

            - name: Invoke proto update workflow Permify/permify-node repo
              uses: benc-uk/workflow-dispatch@e2e5e9a103e331dad343f381a29e654aea3cf8fc # v1.2.4
              with:
                workflow: protos.yml
                repo: Permify/permify-node
                ref: main
                token: "${{ secrets.SDK_GH_TOKEN }}"
                inputs: '{ "version": "${{ github.event.release.tag_name || inputs.version }}" }'
